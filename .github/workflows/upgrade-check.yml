name: Upgrade contract checks

on:
  # Auto-run disabled for this personal site; only "Deploy site" runs automatically.
  # Run manually from the Actions tab ("Run workflow") if you ever need this.
  workflow_dispatch:

jobs:
  upgrade-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      - name: Run upgrade audit 🧪
        run: bundle exec al-folio upgrade audit

      - name: Upload upgrade report 📄
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: al-folio-upgrade-report
          path: al-folio-upgrade-report.md
          if-no-files-found: ignore
