    Experience:
      - company: Norma, Inc.
        position: Researcher, Quantum AI Team
        location: Seoul, South Korea
        start_date: 2025-07
        end_date: present
        highlights:
          - "Co-developed Norma's in-house Pauli Propagation toolkit (\"Pado-Pauli\") for quantum algorithm simulation, a GPU-accelerated, differentiable surrogate publicly released on GitHub; the GPU path runs ~35-49x faster than the CPU path (coefficient-truncation error <1e-4), with native batched processing for quantum-native ML and head-to-head benchmarks against existing Pauli-propagation implementations reported in a paper in preparation."
          - "Built quantum generative models (Quantum GAN, IQP-QCBM) in PyTorch and NVIDIA CUDA-Q for drug discovery; studied the expressivity and trainability of variational quantum circuits."
          - "Designed a neural-network-based quantum error mitigation (QEM) model that predicts and counteracts real-hardware error characteristics, substantially reducing the total variation distance (TVD) between noisy and ideal output distributions."
          - "Analyzed the noise resilience of VQCs (VQE, QAOA) under both simulation and real-hardware environments."

      - company: National Information Society Agency (NIA) — KQIC Quantum Internship (4th Cohort)
