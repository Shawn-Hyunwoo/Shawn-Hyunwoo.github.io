        summary: National Research Foundation of Korea Quantum Computing Challenge Project (2024–2026).
        highlights:
          - Researched quantum generative models for molecular drug-library generation, integrating KRAS G12D-binding ligand candidates into the evaluation pipeline.
        start_date: 2024
