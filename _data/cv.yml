    Quantum algorithm researcher on the Quantum AI Team at Norma, working on practical and experimentally
    realizable quantum algorithms for the NISQ era. Interested in hardware-efficient quantum machine learning,
    Pauli-propagation methods, noise-resilient variational quantum circuits (VQCs), and quantum generative
    models for drug discovery. B.S. in Physics & Artificial Intelligence from Sogang University.

