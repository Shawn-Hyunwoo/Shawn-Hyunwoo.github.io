cv:
  name: Shawn Hyunwoo Kim
  label: Quantum Algorithm Researcher
  email: kimhw7537@gmail.com
  location: Seoul, South Korea
  image: ""
  summary: >
    Graduated in Physics and Artificial Intelligence with a primary research focus on practical and experimentally
    realizable quantum algorithms in the NISQ era. Particularly interested in hardware-efficient quantum machine
    learning, noise-resilient variational quantum circuits (VQCs), and train-on-classical / deploy-on-quantum
    approaches that reduce quantum resource requirements. Currently focused on Pauli Propagation–based methods for
    efficient quantum algorithm design and implementation, aiming to bridge theoretical quantum information science
    with practical real-world applications.

