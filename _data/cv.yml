          - "Relevant Physics coursework: Quantum Physics, Modern Optics, Statistical Physics, Electromagnetics, Solid-State Physics, Experimental Physics, Classical Dynamics, Thermodynamics, Computational Physics II"
          - "External coursework (Yonsei University, credit exchange): Quantum Information Science, Quantum Computing"
          - "Relevant AI & CS coursework: Data Structures, Algorithms, Statistics, Linear Algebra, Introduction to Machine Learning, Introduction to Deep Learning, Computational Thinking (Python), Introduction to C"

    Experience:
      - company: Norma, Inc.
        position: Researcher, Quantum AI Team
        location: Seoul, South Korea
        start_date: 2025-07
        end_date: present
        highlights:
          - Implemented quantum generative models (QGAN, IQP-QCBM) using Qiskit, PennyLane and NVIDIA CUDA-Q to study the expressive power and trainability of variational quantum circuits.
          - Developed a Python toolkit for Pauli Propagation–based quantum algorithm implementation, enabling efficient simulation of operator evolution and implementation of diverse quantum algorithms including QAOA and VQE.
          - Analyzed the noise resilience of variational quantum circuits (VQE, QAOA) under both simulation and real-hardware environments.
          - Developed a neural-network-based quantum error mitigation (QEM) model to suppress noise effects in small-scale variational quantum circuits.

      - company: Pohang University of Science and Technology (POSTECH), Department of Physics
        position: Research Assistant (Supervisor — Prof. Yoonho Kim)
        location: Pohang, South Korea
        start_date: 2024-07
        end_date: 2024-07
        highlights:
          - Research intern at the Quantum Optics and Quantum Information Group.
          - Designed and aligned a high-precision interferometer and conducted Bell-test measurements using a 1550 nm Kalmár laser.
          - Performed SPDC (Spontaneous Parametric Down-Conversion) experiments for photon-pair generation and entanglement studies, and supported time-energy entanglement experiments.

      - company: Sogang University, Department of Physics
        position: Research Assistant (Supervisor — Prof. Minsoo Kim)
        location: Seoul, South Korea
        start_date: 2024-09
        end_date: 2024-12
        highlights:
          - Analyzed quantum Hall transport data in mesoscopic 2D systems.
          - Studied valley-dependent transport and Dirac-cone related phenomena.
          - Supported theoretical modeling linking experimental observables to band structure.

